# Optional annotation backend runner.
# CellTypist and SingleR are implemented. SCimilarity is scaffolded so the repo
# already reflects the full manuscript pipeline, but users should provide
# SCimilarity outputs as annotation columns or CSVs until that automatic backend
# is implemented.

input_h5ad: example_data/val_ranked_bins_example.h5ad
output_dir: figures/example_annotation_backends

expression:
  # CellTypist expects log1p-normalized expression to 10,000 counts per cell.
  # Set these to false if your selected matrix is already prepared.
  layer:
  use_raw: false
  normalize_to_target_sum: true
  target_sum: 10000
  log1p: true

annotation_backends:
  celltypist:
    enabled: true
    model: Immune_All_Low.pkl
    download_models: false
    force_update_models: false
    majority_voting: false
    over_clustering:
    use_gpu: false
    prefix: celltypist
    label_source: auto
    on_unavailable: skip

  singler:
    enabled: false
    # Set enabled: true after installing R/Bioconductor dependencies listed in
    # docs/singler_backend.md. Each reference produces its own label/confidence
    # columns, e.g. singler_hpca_label and singler_hpca_confidence.
    references:
      - HPCA
      - Monaco
      - DICE
      - BlueprintEncode
      - Novershtern
    prefix: singler
    rscript: Rscript
    label_field: label.main
    prune_labels: true
    score_column: assigned_label_score
    assay_type_ref: logcounts
    keep_temp: false
    on_unavailable: skip

  scimilarity:
    enabled: false
    # Automatic SCimilarity execution is scaffolded for a future release.
    # Users with precomputed SCimilarity outputs can include those columns in the ACS config.
    model_path:
    prefix: scimilarity
    on_unavailable: skip

outputs:
  combined_annotation_csv: annotation_backend_columns.csv
  status_csv: annotation_backend_status.csv
  write_h5ad: true
  annotated_h5ad: annotation_backends_annotated.h5ad
