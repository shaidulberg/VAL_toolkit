# Optional automatic annotation backend: CellTypist.
#
# This workflow writes CellTypist label/confidence columns that can be used by
# configs/acs_figures.example.yaml together with other annotation methods.

input_h5ad: example_data/val_ranked_bins_example.h5ad
output_dir: figures/example_celltypist_annotations

expression:
  # CellTypist expects gene symbols in adata.var_names and log1p-normalized
  # expression to 10,000 counts per cell. If your h5ad already has that in X,
  # leave the three preprocessing options below as false/null.
  layer:
  use_raw: false
  normalize_to_target_sum: false
  target_sum: 10000
  log1p: false

celltypist:
  model: Immune_All_Low.pkl
  prefix: celltypist
  label_source: auto
  majority_voting: false
  over_clustering:
  use_gpu: false

  # Set download_models to true the first time you run CellTypist on a new machine.
  download_models: false
  force_update_models: false

outputs:
  annotation_csv: celltypist_annotations.csv
  annotated_h5ad: celltypist_annotated.h5ad
  write_h5ad: true
